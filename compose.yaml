version: '3.8'

services:
  postgres-db:
    image: postgres:17-alpine
    container_name: quarryflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quarryflow_network

  # Serviço do Flyway para rodar as migrations
  flyway:
    image: flyway/flyway:10-alpine
    container_name: quarryflow_migrations
    depends_on:
      - postgres-db
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-db:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Aponta para a pasta onde o Flyway espera encontrar os arquivos .sql
      - ./src/main/resources/db/migration:/flyway/sql
    command: migrate
    networks:
      - quarryflow_network

volumes:
  postgres_data:

networks:
  quarryflow_network:
    driver: bridge